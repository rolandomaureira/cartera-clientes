<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartera de Clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Preflight desactivado a propósito: esta app ya tiene sus propios estilos
  // base (topbar, tablas, botones). Tailwind se usa solo como utilidades
  // dentro de la sección "Requerimientos", sin resetear el resto de la app.
  tailwind.config = { corePlugins: { preflight: false } };
</script>
<style>
  :root{
    --ink:#161B22;
    --paper:#EEEBE1;
    --paper-2:#E4E0D2;
    --teal:#1F6F5C;
    --teal-dark:#154F41;
    --gold:#B8892B;
    --line:#C9C3B0;
    --danger:#A3402F;
    --white:#FBFAF6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .display{font-family:'Fraunces', serif;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 32px;
    border-bottom:2px solid var(--ink);
    background:var(--paper);
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .stamp{
    width:38px;height:38px;border-radius:50%;
    border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:700;font-size:15px;
    transform:rotate(-8deg);
    flex-shrink:0;
  }
  .brand h1{
    font-size:22px;margin:0;font-weight:600;letter-spacing:0.2px;
  }
  .brand .sub{font-size:12px;color:#5a5a52;margin-top:2px;letter-spacing:0.5px;text-transform:uppercase;}
  .whoami{display:flex;align-items:center;gap:12px;font-size:14px;}
  .role-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:4px 10px;
    border-radius:3px;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .role-badge.admin{background:var(--gold);color:var(--ink);}
  .role-badge.encargado{background:var(--teal);color:var(--white);}
  .uf-badge{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink);
    background:var(--paper-2);border:1px solid var(--line);
    padding:5px 10px;border-radius:3px;
  }
  .uf-badge .uf-date{color:#8a8879;}
  .uf-badge.uf-error{color:#8a8879;font-style:italic;}
  .switch-btn{
    background:none;border:1px solid var(--ink);color:var(--ink);
    padding:6px 12px;border-radius:3px;font-size:13px;cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif;
  }
  .switch-btn:hover{background:var(--ink);color:var(--white);}

  /* ---------- Gate screen ---------- */
  .gate{
    min-height:calc(100vh - 80px);
    display:flex;align-items:center;justify-content:center;
    padding:40px 20px;
  }
  .gate-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:6px;
    padding:44px 40px;
    max-width:440px;width:100%;
    box-shadow:0 2px 0 var(--line);

  .gate-card h2{
    font-size:28px;margin:0 0 6px;font-weight:600;
  }
  .gate-card p.lead{color:#6b6a5f;font-size:14px;margin:0 0 28px;}
  .gate-list{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
  .gate-option{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;border:1px solid var(--line);border-radius:4px;
    background:var(--paper);cursor:pointer;text-align:left;
    font-family:'IBM Plex Sans',sans-serif;font-size:15px;color:var(--ink);
  }
  .gate-option:hover{border-color:var(--teal);background:#E4EFEC;}
  .gate-option .tag{font-size:11px;color:#6b6a5f;font-family:'IBM Plex Mono',monospace;}
  .gate-admin{border-left:4px solid var(--gold);}
  .gate-enc{border-left:4px solid var(--teal);}
  .gate-divider{
    display:flex;align-items:center;gap:10px;margin:18px 0;
    color:#9a9689;font-size:12px;text-transform:uppercase;letter-spacing:1px;
  }
  .gate-divider::before,.gate-divider::after{content:'';flex:1;height:1px;background:var(--line);}
  .add-enc-row{display:flex;gap:8px;}

  /* ---------- Layout ---------- */
  .layout{display:flex;min-height:calc(100vh - 80px);}

    width:230px;flex-shrink:0;
    border-right:2px solid var(--ink);

  }
  .folders h3{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6b6a5f;

  .folder-tab{

  .main{flex:1;padding:32px 40px;}

  .btn{
    background:var(--ink);color:var(--white);border:none;

  thead th{

    font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:7px 9px;

  .row-actions{display:flex;gap:6px;}

  .client-notes{font-size:12px;color:#8a8879;margin-top:2px;}
  .form-inline{
    display:flex;gap:8px;padding:16px;background:var(--white);
    border:1px solid var(--line);border-radius:6px;margin-bottom:16px;flex-wrap:wrap;
  }
  .form-inline input{flex:1;min-width:140px;}
  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--white);
    padding:12px 18px;border-radius:5px;font-size:13px;opacity:0;transform:translateY(8px);
    transition:all .25s ease;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .manage-section{margin-top:34px;}
  .manage-section h3{font-size:15px;margin-bottom:10px;}

  /* Tabs */
  .tabbar{
    display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--ink);
  }
  .tab-item{
    padding:10px 18px;font-size:14px;cursor:pointer;color:#6b6a5f;
    border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500;

  .tab-item.active{color:var(--ink);border-bottom-color:var(--teal);}

  /* F-29 status select */

    font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:12px;
    border-width:1px;padding:6px 10px;

  .onboard-grid{

    .onboard-grid{grid-template-columns:1fr;}

  /* Detalle de cliente (modal) */

  .client-clickable:hover{color:var(--teal-dark);text-decoration-color:var(--teal);}
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(22,27,34,0.55);
    display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;

  .modal-card{
    background:var(--white);border-radius:6px;padding:28px;max-width:640px;width:100%;
    max-height:88vh;overflow-y:auto;box-shadow:0 8px 0 var(--ink);

  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-head h3{margin:0;font-size:22px;}

  /* Login BPO 1 */
  .tg-login-bg{
    position:fixed;inset:0;z-index:50;
    background:radial-gradient(ellipse at top, #16204a 0%, #0a1030 70%);
    display:flex;align-items:center;justify-content:center;padding:20px;
    font-family:'IBM Plex Sans',sans-serif;
  }
  .tg-card{
    background:#ffffff;border-radius:28px;padding:48px 40px;
    max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .tg-brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:28px;}
  .tg-logo{width:46px;height:40px;flex-shrink:0;}
  .tg-title{font-size:22px;font-weight:800;color:#111a33;letter-spacing:0.3px;line-height:1.1;}
  .tg-subtitle{font-size:11px;font-weight:600;color:#8a93a8;letter-spacing:2px;margin-top:2px;}
  .tg-heading{
    text-align:center;font-size:14px;font-weight:700;letter-spacing:2px;
    color:#5b6b93;margin-bottom:24px;
  }
  .tg-error{color:var(--danger);font-size:13px;min-height:18px;text-align:center;margin-bottom:6px;}
  .tg-input{
    width:100%;padding:15px 18px;border-radius:14px;border:1.5px solid #e3e6ef;
    font-size:15px;color:#1a1a2e;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif;
    background:#fafbff;
  }
  .tg-input::placeholder{color:#9aa3b8;}
  .tg-input:focus{outline:none;border-color:#3e6ff0;background:#fff;}
  .tg-button{
    width:100%;padding:16px;border:none;border-radius:14px;
    background:#2a52d6;color:#fff;font-size:15px;font-weight:700;
    cursor:pointer;font-family:'IBM Plex Sans',sans-serif;
  }
  .tg-button:hover{background:#2044bd;}
  .encargado-chip{
    display:inline-flex;align-items:center;gap:8px;background:var(--white);
    border:1px solid var(--line);padding:6px 6px 6px 12px;border-radius:20px;
    font-size:13px;margin:0 8px 8px 0;
  }
  .encargado-chip button{
    background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;
    width:20px;height:20px;border-radius:50%;

  @media (max-width: 720px){
    .layout{flex-direction:column;}
    .folders{width:100%;border-right:none;border-bottom:2px solid var(--ink);}

</style>

<body>

<div class="topbar" id="topbar">
  <div class="brand">
    <div class="stamp display">CC</div>
    <div>
      <h1 class="display">Cartera de Clientes</h1>
      <div class="sub">Registro por encargado</div>
    </div>
  </div>
  <div class="whoami" id="whoamiBox" style="display:none;position:relative;">
    <span id="ufBox"></span>
    <span id="roleBadge"></span>
    <button class="switch-btn" onclick="toggleCalendarioDropdown()" title="Calendario tributario">📅 Calendario</button>
    <button class="switch-btn" onclick="goToGate()">Cambiar usuario</button>
    <div id="calendarioDropdownRoot"></div>
  </div>
</div>

<div id="app"></div>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script type="application/json" id="credsDataJson">{"usuarios": {}}</script>

<script type="application/json" id="seedDataJson">{"usuarios": [], "clientes": [], "requerimientos": []}</script>

<script>
const STORAGE_KEY = 'directorio';
let state = null;         // { usuarios: [{id,name,rol}], clientes: [{id,name,...,encargadoId,notas}] }
let currentUser = null;   // { id, name, rol, isAdmin }
let activeFolder = 'todos';
let activeTab = 'inicio';
let activeSucursal = 'todos'; // 'todos' | 'Concepcion' | 'Temuco' (solo relevante para Administrador)
let facturacionMes = null; // 'YYYY-MM', se inicializa al mes actual la primera vez que se abre la pestaña
let calendarioMes = null; // 'YYYY-MM' del calendario tributario en Inicio
let tablePage = 1; // página actual de la tabla grande visible (Cartera, F-29, Facturación o Tareas)
const PAGE_SIZE = 75;
let f29Selected = new Set();      // ids de clientes marcados para acción masiva en F-29
let facturaSelected = new Set();  // ids de clientes marcados para acción masiva en Facturación
let rentaSelected = new Set();    // ids de clientes marcados para acción masiva en Declaración Renta
function clearBulkSelections(){ f29Selected.clear(); facturaSelected.clear(); rentaSelected.clear(); }

// Sub-pestaña activa dentro de "Obligaciones Tributarias".
let obligacionesSubTab = 'confeccion-iva';

const ROLES_DISPONIBLES = ['Administrador', 'Contabilidad', 'TAX', 'Encargado', 'Asistente'];
function esRolAdmin(rol){ return typeof rol === 'string' && rol.startsWith('Administrador'); }
function esRolAsistente(rol){ return typeof rol === 'string' && rol.startsWith('Asistente'); }
function esRolContabilidad(rol){ return rol === 'Contabilidad'; }

// Administrador, Contabilidad y TAX ven todas las carteras (de todos los
// encargados, ambas sucursales) en vez de estar acotados a la suya propia.
function puedeVerTodasLasCarteras(u){
  return !!u.isAdmin || esRolContabilidad(u.rol) || u.rol === 'TAX';
}

// Devuelve los IDs de encargados cuya cartera puede ver un usuario.
// Asistente: solo lo que tenga en carterasVisibles (el admin se las asigna manualmente).
// Encargado: solo su propia cartera.
function carterasDeUsuario(u){
  if(esRolAsistente(u.rol)) return u.carterasVisibles || [];
  return [u.id];
}

// Personas que efectivamente tienen clientes bajo su propio ID (para poder ofrecerlas
// como "cartera adicional" a otorgar a un asistente).
function carterasDisponibles(sucursal){
  const ids = new Set(state.clientes.map(c => c.encargadoId).filter(Boolean));
  let opciones = state.usuarios.filter(u => ids.has(u.id));
  if(sucursal) opciones = opciones.filter(u => u.sucursal === sucursal);
  return opciones;
}

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

// Utilidad genérica de debounce: agrupa llamadas repetidas en una sola,
// ejecutada `wait` ms después de la última invocación. flush() ejecuta de
// inmediato lo pendiente (o no hace nada si no hay nada agendado); cancel()
// descarta lo pendiente sin ejecutarlo.
function makeDebouncer(fn, wait){
  let timer = null;
  let pendingArgs = null;
  function run(...args){
    pendingArgs = args;
    clearTimeout(timer);
    timer = setTimeout(() => {
      timer = null;
      const a = pendingArgs;
      pendingArgs = null;
      fn(...a);
    }, wait);
  }
  function flush(){
    if(timer === null) return;
    clearTimeout(timer);
    timer = null;
    const a = pendingArgs;
    pendingArgs = null;
    fn(...a);
  }
  function cancel(){
    clearTimeout(timer);
    timer = null;
    pendingArgs = null;
  }
  return { run, flush, cancel };
}

// Paginación genérica para tablas grandes: corta `list` a la página pedida,
// respetando cualquier filtro ya aplicado antes de llamarla (sucursal,
// encargado, búsqueda, mes, etc. — quien llama filtra primero, esto solo pagina).
function paginate(list, page){
  const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
  const clampedPage = Math.min(Math.max(1, page || 1), totalPages);
  const start = (clampedPage - 1) * PAGE_SIZE;
  return { pageItems: list.slice(start, start + PAGE_SIZE), totalPages, page: clampedPage, total: list.length };
}

function setTablePage(p){
  clearBulkSelections();
  tablePage = p;
  renderApp();
}

function paginationControls(page, totalPages){
  if(totalPages <= 1) return '';
  return `
    <div style="display:flex;align-items:center;gap:14px;justify-content:flex-end;margin-top:14px;padding:0 4px;font-size:13px;color:#6b6a5f;">
      <button class="btn secondary small" ${page<=1?'disabled':''} onclick="setTablePage(${page-1})">← Anterior</button>
      <span class="mono">Página ${page} de ${totalPages}</span>
      <button class="btn secondary small" ${page>=totalPages?'disabled':''} onclick="setTablePage(${page+1})">Siguiente →</button>
    </div>
  `;
}

function seedData(){
  try{
    const raw = document.getElementById('seedDataJson').textContent;
    return JSON.parse(raw);
  }catch(e){
    return { usuarios: [], clientes: [], requerimientos: [] };
  }
}

// ==== Backend compartido (Google Sheets vía Apps Script) ====
// TODO: pega aquí tu URL de Apps Script (termina en /exec). Ver backend-sheets/README.md
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyWbEqfgc_dRyUZsqVg4Gle1Qq3HwMBdfKRhIvzOR2kQmLUPl6NmYLpNZvi0ZGwiYvzKw/exec';
const API_TOKEN = '4612fb0489acc4364a4ec8fdbbc2c1b3a81d4781116827274056e2ff5f7df096'; // debe coincidir con API_TOKEN en Code.gs

async function kvGet(key){
  if(!BACKEND_URL) return null; // sin backend configurado: se usa el respaldo de más abajo
  try{
    const res = await fetch(`${BACKEND_URL}?key=${encodeURIComponent(key)}&token=${encodeURIComponent(API_TOKEN)}`, { cache: 'no-store' });
    const text = await res.text();
    if(!text || text === 'null') return null;
    return { value: text };
  }catch(e){
    console.error('No se pudo leer del backend:', e);
    return null;
  }
}

async function kvSet(key, value){
  if(!BACKEND_URL) return false;
  try{
    await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS en Apps Script
      body: JSON.stringify({ key, value, token: API_TOKEN })
    });
    return true;
  }catch(e){
    console.error('No se pudo guardar en el backend:', e);
    return false;
  }
}

async function loadState(){
  try{
    const res = await kvGet(STORAGE_KEY);
    state = res ? JSON.parse(res.value) : seedData();
  }catch(e){
    state = seedData();
  }
  if(!state.usuarios) state.usuarios = [];
  if(!state.clientes) state.clientes = [];
  if(!state.requerimientos) state.requerimientos = [];
  if(!state.obligaciones) state.obligaciones = [];
  if(!state.reuniones) state.reuniones = [];
  if(!state.tareasPlantilla) state.tareasPlantilla = ['Revisar libro de compras', 'Revisar libro de ventas', 'Conciliación bancaria', 'Declarar IVA (F-29)'];
  if(!state.declaracionesJuradasPlantilla) state.declaracionesJuradasPlantilla = DECLARACIONES_JURADAS_DEFAULT.slice();
}

// Declaraciones juradas de renta más comunes para pymes (fuente: SII / Operación
// Renta), usadas como plantilla inicial de la sub-pestaña "Declaraciones Juradas".

// Guardado agrupado: cada llamada a saveState() reinicia una ventana de
// ~1.75s; si llegan más cambios antes de que se cumpla, se agrupan y se manda
// un solo POST con el JSON completo al final, en vez de uno por cada cambio
// individual. flushPendingSaves() (ver más abajo) dispara de inmediato lo que
// esté pendiente al cambiar de sección o cerrar la pestaña, para no perderlo.
const stateSaveDebouncer = makeDebouncer(async () => {
  try{
    const ok = await kvSet(STORAGE_KEY, JSON.stringify(state));
    if(!ok && BACKEND_URL) showToast('No se pudo guardar. Intenta de nuevo.');
  }catch(e){
    showToast('Error al guardar los datos.');
  }
}, 1750);

async function saveState(){
  stateSaveDebouncer.run();
}

let creds = null; // { usuarios: { id: hash } }
const CREDS_KEY = 'credenciales';

function seedCreds(){
  try{
    const raw = document.getElementById('credsDataJson').textContent;
    return JSON.parse(raw);
  }catch(e){
    return { usuarios: {} };
  }
}

async function loadCreds(){
  try{
    const res = await kvGet(CREDS_KEY);
    creds = res ? JSON.parse(res.value) : seedCreds();
  }catch(e){
    creds = seedCreds();
  }
  if(!creds.usuarios) creds.usuarios = {};
}

const credsSaveDebouncer = makeDebouncer(async () => {
  try{
    const ok = await kvSet(CREDS_KEY, JSON.stringify(creds));
    if(!ok && BACKEND_URL) showToast('No se pudo guardar la clave.');
  }catch(e){
    showToast('Error al guardar la clave.');
  }
}, 1750);

async function saveCreds(){
  credsSaveDebouncer.run();
}

// Dispara de inmediato cualquier guardado agrupado que esté esperando su
// ventana de ~1.75s. Se llama al cambiar de sección/pestaña y al cerrar la
// pestaña, para que el último cambio no se pierda.
function flushPendingSaves(){
  stateSaveDebouncer.flush();
  credsSaveDebouncer.flush();
}

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

let ufInfo = null; // { valor, fecha }
let ufLoading = false;
async function loadUF(){
  ufLoading = true;
  renderUFBadge();
  try{
    const res = await fetch('https://mindicador.cl/api/uf', { cache: 'no-store' });
    const data = await res.json();
    // No asumir el orden del arreglo: se busca la fecha más reciente explícitamente.
    const last = data.serie.reduce((max, item) => (!max || item.fecha > max.fecha) ? item : max, null);
    const [y,m,d] = last.fecha.split('T')[0].split('-');
    const valorFmt = last.valor.toLocaleString('es-CL', {minimumFractionDigits:2, maximumFractionDigits:2});
    ufInfo = { valor: valorFmt, fecha: `${d}-${m}-${y}` };
  }catch(e){
    ufInfo = null;
    console.error('No se pudo obtener la UF:', e);
  }
  ufLoading = false;
  renderUFBadge();
}

function renderUFBadge(){
  const ufSpan = document.getElementById('ufBox');
  if(!ufSpan) return;
  if(ufLoading){
    ufSpan.innerHTML = `<span class="uf-badge">Cargando UF…</span>`;
    return;
  }
  ufSpan.innerHTML = ufInfo
    ? `<span class="uf-badge">UF hoy $${ufInfo.valor} <span class="uf-date">(${ufInfo.fecha})</span></span>`
    : `<span class="uf-badge uf-error">UF no disponible <button class="switch-btn" style="padding:2px 8px;font-size:11px;margin-left:4px;" onclick="loadUF()">Reintentar</button></span>`;
}

  `;

  uInput.focus();

  pInput.addEventListener('keydown', (ev)=>{ if(ev.key==='Enter') checkLogin(); });

async function checkLogin(){
  const usuarioVal = document.getElementById('loginUsuario').value.trim().toLowerCase();
  const claveVal = document.getElementById('loginClave').value;
  const errBox = document.getElementById('loginError');
  const u = state.usuarios.find(u => (u.usuario||'').toLowerCase() === usuarioVal);
  const hash = await sha256(claveVal);
  const expected = u ? creds.usuarios[u.id] : null;
  if(!u || !expected || hash !== expected){
    errBox.textContent = 'Usuario o clave incorrectos.';
    document.getElementById('loginClave').value = '';
    return;
  }
  enterAsUsuario(u.id);
}

function enterAsUsuario(id){
  const u = state.usuarios.find(u => u.id === id);
  if(!u) return;
  // sucursal y carterasVisibles se copian del registro completo: sin esto,
  // carterasDeUsuario(currentUser) siempre devolvía [] para los Asistentes
  // (veían su cartera vacía sin importar lo que tuvieran asignado).
  currentUser = { id: u.id, name: u.name, rol: u.rol, isAdmin: esRolAdmin(u.rol), sucursal: u.sucursal, carterasVisibles: u.carterasVisibles };
  activeFolder = 'todos';
  showWhoami();
  renderApp();
}

function showWhoami(){
  document.getElementById('topbar').style.display = 'flex';
  const box = document.getElementById('whoamiBox');
  const badge = document.getElementById('roleBadge');
  box.style.display = 'flex';
  badge.innerHTML = currentUser.isAdmin
    ? `<span class="role-badge admin">${escapeHtml(currentUser.name)} · ${escapeHtml(currentUser.rol)}</span>`
    : `<span class="role-badge encargado">${escapeHtml(currentUser.name)} · ${escapeHtml(currentUser.rol)}</span>`;
  renderUFBadge();
}

function encargadoFilterBar(unassigned){
  const base = clientesEnSucursalActiva();
  const chips = state.usuarios
    .map(u => ({ u, n: base.filter(c => c.encargadoId === u.id).length }))
    .filter(({n}) => n > 0)
    .map(({u, n}) => `<div class="filter-chip ${activeFolder===u.id?'active':''}" onclick="setFolder('${u.id}')">${escapeHtml(u.name)} <span class="count">${n}</span></div>`)
    .join('');
  return `
    <div class="filter-bar">
      <div class="filter-chip ${activeFolder==='todos'?'active':''}" onclick="setFolder('todos')">Todos <span class="count">${base.length}</span></div>
      ${chips}
      ${unassigned.length ? `<div class="filter-chip ${activeFolder==='sin_asignar'?'active':''}" onclick="setFolder('sin_asignar')">Sin asignar <span class="count">${unassigned.length}</span></div>` : ''}
    </div>
  `;
}

function clientesEnSucursalActiva(){
  if(activeSucursal === 'todos') return state.clientes;
  return state.clientes.filter(c => c.sucursal === activeSucursal);
}

function currentList(unassigned){
  const base = clientesEnSucursalActiva();
  let list;
  if(activeFolder==='todos') list = base;
  else if(activeFolder==='sin_asignar') list = unassigned;
  else list = base.filter(c => c.encargadoId === activeFolder);

  const q = (searchQuery||'').trim().toLowerCase();
  if(q){
    list = list.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.rut||'').toLowerCase().includes(q)
    );
  }
  return list;
}

function sucursalFilterBar(){
  const sucursales = ['Concepcion', 'Temuco'];
  return `
    <div class="filter-bar" style="margin-bottom:10px;">
      <div class="filter-chip ${activeSucursal==='todos'?'active':''}" onclick="setSucursal('todos')">Ambas sucursales</div>
      ${sucursales.map(s => `<div class="filter-chip ${activeSucursal===s?'active':''}" onclick="setSucursal('${s}')">${s}</div>`).join('')}

}

function toggleObPersonaNatural(regimen){
  const esPN = regimen === 'Persona Natural';
  const repWrap = document.getElementById('ob_rep_wrap');
  const actWrap = document.getElementById('ob_actividad_wrap');
  if(repWrap) repWrap.style.display = esPN ? 'none' : 'flex';
  if(actWrap) actWrap.style.display = esPN ? 'none' : 'flex';
}

async function submitIncorporarCliente(isAdmin){
  if(!currentUser.isAdmin) return showToast('Solo un administrador puede agregar clientes.');
  const name = document.getElementById('ob_name').value.trim();
  const rut = document.getElementById('ob_rut').value.trim();
  const clave = document.getElementById('ob_clave').value.trim();
  const regimen = document.getElementById('ob_regimen').value;
  const esPersonaNaturalNueva = regimen === 'Persona Natural';
  const representanteLegal = esPersonaNaturalNueva ? '' : document.getElementById('ob_rep').value.trim();
  const actividadEconomica = esPersonaNaturalNueva ? '' : document.getElementById('ob_actividad').value.trim();
  const valorInput = document.getElementById('ob_valor_mensual');
  const valorParsed = valorInput ? parseFloat(valorInput.value) : NaN;
  const valorServicioMensual = isNaN(valorParsed) ? null : valorParsed;
  const encargadoId = document.getElementById('ob_encargado').value || null;
  const encargadoUsuario = state.usuarios.find(u => u.id === encargadoId);
  const sucursal = encargadoUsuario && encargadoUsuario.sucursal !== 'Ambas' ? encargadoUsuario.sucursal : 'Concepcion';

  if(!name){ showToast('Escribe la razón social del cliente.'); return; }
  if(!rut){ showToast('Escribe el RUT del cliente.'); return; }

  state.clientes.push({
    id: uid('c'),
    name, rut, clave,
    regimenTributario: regimen,
    representanteLegal,
    actividadEconomica,
    valorServicioMensual,
    encargadoId,
    sucursal,
    notas: '',
    f29Estado: 'no_enviado',
    f29Requerido: false
  });
  await saveState();
  showToast('Cliente incorporado correctamente.');
  renderApp();
}

// Sub-pestaña "Confección Iva" dentro de Obligaciones Tributarias.
// verTodo=true (Administrador/Contabilidad/TAX): igual que antes, con filtro
// de sucursal y chips por encargado. verTodo=false (Encargado/Asistente):
// solo su propia cartera, sin esos filtros (no tienen nada que filtrar).
function confeccionIvaContent(verTodo){
  if(verTodo){
    const nomina = clientesEnSucursalActiva().filter(c => c.f29Requerido || c.f29CasoEspecialMes === mesActualISO());
    const unassignedNomina = nomina.filter(c => !c.encargadoId || !state.usuarios.find(e=>e.id===c.encargadoId));

    let list;
    if(activeFolder==='todos') list = nomina;
    else if(activeFolder==='sin_asignar') list = unassignedNomina;
    else list = nomina.filter(c => c.encargadoId === activeFolder);

    const q = (searchQuery||'').trim().toLowerCase();
    if(q){
      list = list.filter(c => (c.name||'').toLowerCase().includes(q) || (c.rut||'').toLowerCase().includes(q));
    }

    const enviados = list.filter(c => c.f29Estado === 'enviado').length;
    const { pageItems, totalPages, page } = paginate(list, tablePage);

    const chips = state.usuarios
      .map(e => ({ e, n: nomina.filter(c => c.encargadoId === e.id).length }))
      .filter(({n}) => n > 0)

async function setF29Status(clientId, value){
  const c = state.clientes.find(c => c.id === clientId);
  if(!c) return;
  const wasEnviado = c.f29Estado === 'enviado';
  c.f29Estado = value;
  await saveState();
  // Re-render parcial: en vez de reconstruir toda la tabla, solo se ajusta el
  // contador "X de Y enviados" (id="f29Meta") en +1/-1. El propio <select> ya
  // actualiza su color inline (ver f29Table).
  const nowEnviado = value === 'enviado';
  if(wasEnviado !== nowEnviado){
    const metaEl = document.getElementById('f29Meta');
    // Busca "N de M enviado(s)" en cualquier parte del texto (en la vista de
    // encargado va precedido del nombre, ej. "Stefania Sandoval · N de M…").
    if(metaEl){
      metaEl.textContent = metaEl.textContent.replace(/(\d+)( de \d+ enviado)/,
        (m, num, resto) => (parseInt(num, 10) + (nowEnviado ? 1 : -1)) + resto);
    }
  }
}

// Sub-pestaña "Declaración Renta" dentro de Obligaciones Tributarias — mismo
// parámetro que Confección Iva (nómina + estado No enviado/Enviado), solo que
// aplicado al trámite anual de Renta en vez del IVA mensual.
function declaracionRentaContent(verTodo){
  if(verTodo){
    const nomina = clientesEnSucursalActiva().filter(c => c.rentaRequerido);
    const unassignedNomina = nomina.filter(c => !c.encargadoId || !state.usuarios.find(e=>e.id===c.encargadoId));

    let list;
    if(activeFolder==='todos') list = nomina;
    else if(activeFolder==='sin_asignar') list = unassignedNomina;
    else list = nomina.filter(c => c.encargadoId === activeFolder);

    const q = (searchQuery||'').trim().toLowerCase();
    if(q){
      list = list.filter(c => (c.name||'').toLowerCase().includes(q) || (c.rut||'').toLowerCase().includes(q));
    }

    const enviados = list.filter(c => c.rentaEstado === 'enviado').length;
    const { pageItems, totalPages, page } = paginate(list, tablePage);

    const chips = state.usuarios
      .map(e => ({ e, n: nomina.filter(c => c.encargadoId === e.id).length }))
      .filter(({n}) => n > 0)
      .map(({e, n}) => `<div class="filter-chip ${activeFolder===e.id?'active':''}" onclick="setFolder('${e.id}')">${escapeHtml(e.name)} <span class="count">${n}</span></div>`)
      .join('');

    return `
      ${sucursalFilterBar()}
      <div class="filter-bar">
        <div class="filter-chip ${activeFolder==='todos'?'active':''}" onclick="setFolder('todos')">Todos <span class="count">${nomina.length}</span></div>
        ${chips}
        ${unassignedNomina.length ? `<div class="filter-chip ${activeFolder==='sin_asignar'?'active':''}" onclick="setFolder('sin_asignar')">Sin asignar <span class="count">${unassignedNomina.length}</span></div>` : ''}
      </div>
      <div class="main-head">
        <div>
          <h2 class="display">${escapeHtml(currentFolderLabel())}</h2>
          <div class="meta" id="rentaMeta">${enviados} de ${list.length} enviado${list.length===1?'':'s'} · solo empresas marcadas como parte de la nómina de Renta</div>
        </div>
        <input type="text" id="searchBox" placeholder="Buscar por nombre o RUT…" value="${escapeHtml(searchQuery||'')}" oninput="onSearch(this.value)" style="min-width:240px;">
      </div>
      ${list.length ? rentaTable(pageItems, true) + paginationControls(page, totalPages) : `<div class="empty-state">
          <div class="display">${q ? 'Sin resultados' : 'Sin clientes en la nómina de Renta'}</div>
          <div>${q ? 'Prueba con otro nombre o RUT.' : 'Marca clientes desde su ficha (Detalle del cliente → "Requiere Declaración de Renta").'}</div>
        </div>`}
    `;
  }

  const misCarteras = carterasDeUsuario(currentUser);
  const nomina = state.clientes.filter(c => misCarteras.includes(c.encargadoId) && c.rentaRequerido);
  const q = (searchQuery||'').trim().toLowerCase();
  const list = q ? nomina.filter(c => (c.name||'').toLowerCase().includes(q) || (c.rut||'').toLowerCase().includes(q)) : nomina;
  const enviados = list.filter(c => c.rentaEstado === 'enviado').length;
  const { pageItems, totalPages, page } = paginate(list, tablePage);

  return `
    <div class="main-head">
      <div>
        <h2 class="display">Declaración Renta</h2>
        <div class="meta" id="rentaMeta">${escapeHtml(currentUser.name)} · ${enviados} de ${list.length} enviado${list.length===1?'':'s'} · solo empresas marcadas como parte de la nómina de Renta</div>
      </div>
      <input type="text" id="searchBox" placeholder="Buscar por nombre o RUT…" value="${escapeHtml(searchQuery||'')}" oninput="onSearch(this.value)" style="min-width:240px;">
    </div>
    ${list.length ? rentaTable(pageItems, false) + paginationControls(page, totalPages) : `<div class="empty-state">
        <div class="display">${q ? 'Sin resultados' : 'Sin clientes en la nómina de Renta'}</div>
        <div>${q ? 'Prueba con otro nombre o RUT.' : 'El administrador aún no ha marcado clientes de tu cartera para Declaración Renta.'}</div>
      </div>`}
  `;
}

let searchQuery = '';
// Debounce de ~300ms: mientras la persona escribe no se re-renderiza nada;
// recién 300ms después de la última tecla se aplica la búsqueda.
const searchDebouncer = makeDebouncer((v) => {
  searchQuery = v;
  tablePage = 1;
  clearBulkSelections();
  renderApp();
  const box = document.getElementById('searchBox');
  if(box){ box.focus(); box.setSelectionRange(box.value.length, box.value.length); }
}, 300);
function onSearch(v){
  searchDebouncer.run(v);
}

/* ---------------- CALENDARIO TRIBUTARIO (Inicio) ---------------- */

// Feriados fijos + Semana Santa (Viernes y Sábado Santo, calculados con el
// algoritmo de Gauss/Meeus para la Pascua). NOTA: no incluye los feriados que
// la ley chilena traslada a lunes/viernes por decreto específico de cada año
// (ej. 12 y 31 de octubre) ni feriados regionales — cubre los feriados
// nacionales fijos y Semana Santa, suficiente para calcular el corrimiento
// del plazo del F-29 pedido en este calendario.
function festivosChile(year){
  const fijos = [
    `${year}-01-01`, `${year}-05-01`, `${year}-05-21`, `${year}-07-16`,
    `${year}-08-15`, `${year}-09-18`, `${year}-09-19`, `${year}-10-12`,
    `${year}-11-01`, `${year}-12-08`, `${year}-12-25`,
  ];
  const pascua = domingoDePascua(year);
  return new Set([...fijos, sumarDias(pascua, -2), sumarDias(pascua, -1)]);
}

function domingoDePascua(year){
  const a = year % 19, b = Math.floor(year/100), c = year % 100;
  const d = Math.floor(b/4), e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c/4), k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const mes = Math.floor((h + l - 7*m + 114) / 31);
  const dia = ((h + l - 7*m + 114) % 31) + 1;
  return `${year}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
}

function sumarDias(fechaISO, dias){
  const [y,m,d] = fechaISO.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate() + dias);
  return dt.toISOString().slice(0,10);
}

function esFinDeSemana(fechaISO){
  const [y,m,d] = fechaISO.split('-').map(Number);
  const dow = new Date(Date.UTC(y,m-1,d)).getUTCDay(); // 0=domingo, 6=sábado
  return dow === 0 || dow === 6;
}

function esDiaHabil(fechaISO, festivosSet){
  return !esFinDeSemana(fechaISO) && !festivosSet.has(fechaISO);
}

function siguienteDiaHabil(fechaISO, festivosSet){
  let f = fechaISO;
  while(!esDiaHabil(f, festivosSet)) f = sumarDias(f, 1);
  return f;
}

function ultimoDiaHabilDelMes(year, mes1a12, festivosSet){
  const ultimoDiaCalendario = new Date(Date.UTC(year, mes1a12, 0)).getUTCDate();
  let f = `${year}-${String(mes1a12).padStart(2,'0')}-${String(ultimoDiaCalendario).padStart(2,'0')}`;
  while(!esDiaHabil(f, festivosSet)) f = sumarDias(f, -1);
  return f;
}

// Plazos tributarios fijos que caen dentro del mes (year, mes1a12).
function eventosTributariosDelMes(year, mes1a12){
  const festivosSet = new Set([...festivosChile(year), ...festivosChile(year+1)]); // por si el 20 corre a enero
  const eventos = [];

  const f29Base = `${year}-${String(mes1a12).padStart(2,'0')}-20`;
  eventos.push({ fecha: siguienteDiaHabil(f29Base, festivosSet), tipo: 'f29', label: 'Pago F-29' });

  eventos.push({ fecha: ultimoDiaHabilDelMes(year, mes1a12, festivosSet), tipo: 'acuse', label: 'Acuse de recibo' });

  eventos.push({ fecha: `${year}-${String(mes1a12).padStart(2,'0')}-13`, tipo: 'cotizaciones', label: 'Pago de cotizaciones' });

  if(mes1a12 === 4){
    eventos.push({ fecha: `${year}-04-30`, tipo: 'renta', label: 'Envío Declaración Renta' });
  }
  return eventos;
}

  let ny = y, nm = m + delta;
  if(nm < 1){ nm = 12; ny--; } else if(nm > 12){ nm = 1; ny++; }
  calendarioMes = `${ny}-${String(nm).padStart(2,'0')}`;

}

// Eventos (fijos + reuniones) que caen en la semana calendario (lunes a
// domingo) que contiene la fecha de hoy — independiente del mes que se esté
// navegando en el mini calendario.
function eventosDeLaSemanaActual(){
  const hoy = todayISO();
  const dow = new Date(hoy + 'T00:00:00Z').getUTCDay(); // 0=domingo
  const offsetLunes = (dow + 6) % 7;
  const lunes = sumarDias(hoy, -offsetLunes);
  const domingo = sumarDias(lunes, 6);

  const mesesRelevantes = new Set([lunes.slice(0,7), domingo.slice(0,7)]);
  let fijos = [];
  mesesRelevantes.forEach(ym => {
    const [yy, mm] = ym.split('-').map(Number);
    fijos.push(...eventosTributariosDelMes(yy, mm));
  });
  fijos = fijos.filter(e => e.fecha >= lunes && e.fecha <= domingo).map(e => ({ ...e, esReunion: false }));

  const reuniones = (state.reuniones||[])
    .filter(r => r.fecha && r.fecha >= lunes && r.fecha <= domingo)
    .map(r => ({ fecha: r.fecha, hora: r.hora, tipo: 'reunion', label: r.lugar, id: r.id, esReunion: true }));

  const eventos = [...fijos, ...reuniones].sort((a,b) => a.fecha.localeCompare(b.fecha) || (a.hora||'').localeCompare(b.hora||''));
  return { lunes, domingo, eventos };
}

// actual debajo. Se ancla bajo el nombre/rol del usuario en la barra
// superior (ver #calendarioDropdownRoot).
function calendarioDropdownContent(){
  if(!calendarioMes) calendarioMes = new Date().toISOString().slice(0,7);
  const [year, mesStr] = calendarioMes.split('-');
  const y = Number(year), m = Number(mesStr);

  const eventosFijos = eventosTributariosDelMes(y, m).filter(e => e.fecha.startsWith(calendarioMes));
  const reunionesDelMes = (state.reuniones||[]).filter(r => r.fecha && r.fecha.startsWith(calendarioMes));

  const porDia = {};
  eventosFijos.forEach(e => {
    const dia = Number(e.fecha.split('-')[2]);
    (porDia[dia] = porDia[dia] || []).push({ ...e, esReunion: false });
  });
  reunionesDelMes.forEach(r => {
    const dia = Number(r.fecha.split('-')[2]);
    (porDia[dia] = porDia[dia] || []).push({ tipo: 'reunion', label: r.lugar, hora: r.hora, id: r.id, esReunion: true });
  });

  const diasEnMes = new Date(Date.UTC(y, m, 0)).getUTCDate();
  const primerDow = new Date(Date.UTC(y, m-1, 1)).getUTCDay(); // 0=domingo
  const offsetLunes = (primerDow + 6) % 7; // celdas vacías antes del día 1 (semana empieza lunes)

  const celdas = [];
  for(let i=0;i<offsetLunes;i++) celdas.push(null);
  for(let d=1; d<=diasEnMes; d++) celdas.push(d);
  while(celdas.length % 7 !== 0) celdas.push(null);

  const { eventos: eventosSemana } = eventosDeLaSemanaActual();

  return `
    <div style="width:300px;max-height:78vh;overflow-y:auto;font-family:'IBM Plex Sans',sans-serif;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span class="display" style="font-size:15px;">Calendario tributario</span>
        <button class="switch-btn" style="padding:2px 8px;font-size:11px;" onclick="toggleCalendarioDropdown()">Cerrar</button>
      </div>

      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
        <button onclick="cambiarMesCalendario(-1)" style="border:none;background:none;cursor:pointer;color:#6b6a5f;font-size:15px;padding:2px 6px;">←</button>
        <span style="font-size:12px;font-weight:600;min-width:92px;text-align:center;">${mesLabel(calendarioMes)}</span>
        <button onclick="cambiarMesCalendario(1)" style="border:none;background:none;cursor:pointer;color:#6b6a5f;font-size:15px;padding:2px 6px;">→</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:9px;color:#9a9689;margin-bottom:3px;">
        ${DIAS_SEMANA_CORTO.map(d=>`<div>${d[0]}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;">
        ${celdas.map(d => {
          if(!d) return `<div></div>`;
          const fechaISO = `${calendarioMes}-${String(d).padStart(2,'0')}`;
          const esHoy = fechaISO === todayISO();
          const eventosDia = porDia[d] || [];
          return `

      <div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:8px;">Tareas de la semana</div>
      <div style="display:flex;flex-direction:column;gap:2px;margin-bottom:12px;">
        ${eventosSemana.length ? eventosSemana.map(e => `
          <div onclick="${e.esReunion ? `verReunion('${e.id}')` : ''}" style="display:flex;align-items:center;gap:8px;padding:5px 4px;font-size:12px;border-radius:6px;${e.esReunion?'cursor:pointer;':''}" ${e.esReunion?'onmouseover="this.style.background=\'var(--paper-2)\'" onmouseout="this.style.background=\'transparent\'"':''}>
            <span style="display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;${CALENDARIO_COLOR_TIPO[e.tipo]||''}"></span>
            <span class="mono" style="color:#8a8879;font-size:11px;min-width:36px;">${e.fecha.slice(8,10)}/${e.fecha.slice(5,7)}</span>
            <span style="color:var(--ink);">${escapeHtml(e.esReunion ? `${e.hora} · ${e.label}` : e.label)}</span>
          </div>
        `).join('') : `<div style="font-size:12px;color:#8a8879;">Sin eventos esta semana.</div>`}
      </div>

      <button class="btn small" style="width:100%;" onclick="abrirReunionModal(null)">+ Agendar reunión</button>
    </div>
  `;
}

/* ---------------- REUNIONES (modal, se agenda desde el calendario) ---------------- */
let reunionModalModo = null; // 'crear' | 'ver' | null
let reunionModalFecha = null;
let reunionModalVerId = null;

function abrirReunionModal(fechaPrefill){
  reunionModalModo = 'crear';
  reunionModalFecha = fechaPrefill || todayISO();
  renderReunionModal();
}

function verReunion(id){
  reunionModalModo = 'ver';
  reunionModalVerId = id;
  renderReunionModal();
}

function cerrarReunionModal(){
  reunionModalModo = null;
  renderReunionModal();
}

function renderReunionModal(){
  const root = document.getElementById('modalRoot');
  if(!root) return;

  if(reunionModalModo === 'ver'){
    const r = (state.reuniones||[]).find(x => x.id === reunionModalVerId);
    if(!r){ root.innerHTML = ''; return; }
    const nombres = (r.participantes||[]).map(id => (state.usuarios.find(u=>u.id===id)||{}).name).filter(Boolean);
    root.innerHTML = `
      <div class="modal-backdrop" onclick="if(event.target===this) cerrarReunionModal()">
        <div class="modal-card">
          <div class="modal-head">
            <h3 class="display">Reunión</h3>
            <button class="switch-btn" onclick="cerrarReunionModal()">Cerrar</button>
          </div>
          <p style="margin:0 0 8px;"><b>Fecha:</b> ${escapeHtml(r.fecha)} &nbsp; <b>Hora:</b> ${escapeHtml(r.hora)}</p>
          <p style="margin:0 0 8px;"><b>Lugar:</b> ${escapeHtml(r.lugar)}</p>
          ${r.conQuien ? `<p style="margin:0 0 8px;"><b>Con quién:</b> ${escapeHtml(r.conQuien)}</p>` : ''}
          <p style="margin:0 0 8px;"><b>Participantes:</b> ${nombres.length ? escapeHtml(nombres.join(', ')) : 'Sin participantes'}</p>
          ${r.temas ? `<p style="margin:0 0 8px;"><b>Temas a tratar:</b> ${escapeHtml(r.temas)}</p>` : ''}
          <div style="display:flex;gap:10px;margin-top:12px;">
            <button class="btn secondary" onclick="cerrarReunionModal()">Cerrar</button>
            <button class="btn danger" onclick="eliminarReunion('${r.id}')">Eliminar reunión</button>
          </div>
        </div>
      </div>
    `;
    return;
  }

  if(reunionModalModo !== 'crear'){ root.innerHTML = ''; return; }

  // Participantes seleccionables: limitados a la sucursal de quien crea la
  // reunión, salvo Administrador/Contabilidad/TAX, que pueden elegir de
  // ambas sucursales. currentUser no trae "sucursal" (solo
  // id/name/rol/isAdmin), así que se busca el registro completo en state.usuarios.
  const miSucursal = (state.usuarios.find(u => u.id === currentUser.id) || {}).sucursal;
  const sucursalesDisponibles = puedeVerTodasLasCarteras(currentUser)
    ? ['Concepcion', 'Temuco']
    : [miSucursal === 'Ambas' ? 'Concepcion' : miSucursal];
  const participantesDisponibles = state.usuarios.filter(u => sucursalesDisponibles.includes(u.sucursal) || u.sucursal === 'Ambas');

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) cerrarReunionModal()">
      <div class="modal-card">
        <div class="modal-head">
          <h3 class="display">Nueva reunión</h3>
          <button class="switch-btn" onclick="cerrarReunionModal()">Cerrar</button>
        </div>
        <div class="onboard-grid">
          <label>Fecha
            <input type="date" id="reunFecha" value="${escapeAttr(reunionModalFecha)}">
          </label>
          <label>Hora
            <input type="time" id="reunHora" value="09:00">
          </label>
          <label>Lugar
            <input type="text" id="reunLugar" placeholder="Ej: Oficina Concepción, sala 2">
          </label>
          <label>¿Con quién es la reunión?
            <input type="text" id="reunConQuien" placeholder="Ej: Cliente XYZ, SII, banco…">
          </label>
        </div>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#6b6a5f;font-weight:500;margin-bottom:14px;">
          Temas a tratar
          <textarea id="reunTemas" rows="2" placeholder="Breve resumen de los temas a tratar" style="font-size:14px;text-transform:none;letter-spacing:normal;font-weight:400;color:var(--ink);padding:10px 12px;border:1px solid var(--line);border-radius:4px;font-family:'IBM Plex Sans',sans-serif;resize:vertical;"></textarea>
        </label>
        <div style="margin:14px 0;">
          <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#6b6a5f;font-weight:500;margin-bottom:8px;">
            Participantes ${puedeVerTodasLasCarteras(currentUser) ? '(ambas sucursales)' : `(sucursal ${escapeHtml(sucursalesDisponibles[0])})`}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;max-height:180px;overflow-y:auto;">
            ${participantesDisponibles.map(u => `
              <label style="display:flex;align-items:center;gap:6px;border:1px solid var(--line);padding:6px 10px;border-radius:20px;font-size:13px;cursor:pointer;">
                <input type="checkbox" class="reun-participante" value="${u.id}"> ${escapeHtml(u.name)}
              </label>
            `).join('') || '<span style="font-size:13px;color:#8a8879;">No hay usuarios disponibles.</span>'}
          </div>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn secondary" onclick="cerrarReunionModal()">Cancelar</button>
          <button class="btn" style="flex:1;" onclick="submitReunion()">Agendar reunión</button>
        </div>
      </div>
    </div>
  `;
}

async function submitReunion(){
  const fecha = document.getElementById('reunFecha').value;
  const hora = document.getElementById('reunHora').value;
  const lugar = document.getElementById('reunLugar').value.trim();
  const conQuien = document.getElementById('reunConQuien').value.trim();
  const temas = document.getElementById('reunTemas').value.trim();
  const participantes = Array.from(document.querySelectorAll('.reun-participante:checked')).map(cb => cb.value);
  if(!fecha) return showToast('Selecciona una fecha.');
  if(!hora) return showToast('Selecciona una hora.');
  if(!lugar) return showToast('Escribe el lugar de la reunión.');
  if(!state.reuniones) state.reuniones = [];
  state.reuniones.push({ id: uid('reu'), fecha, hora, lugar, conQuien, temas, participantes, creadoPor: currentUser.id });
  await saveState();
  cerrarReunionModal();
  showToast('Reunión agendada.');
  renderCalendarioDropdown();
}

async function eliminarReunion(id){
  if(!confirm('¿Eliminar esta reunión? Esta acción no se puede deshacer.')) return;
  state.reuniones = (state.reuniones||[]).filter(r => r.id !== id);
  await saveState();
  cerrarReunionModal();
  renderCalendarioDropdown();
  showToast('Reunión eliminada.');
}

/* ---------------- INICIO (resumen de pendientes) ---------------- */
function inicioContent(){
  // Administrador, Contabilidad y TAX ven todo el sistema; Encargado y
  // Asistente solo su(s) cartera(s) asignada(s).
  const verTodo = puedeVerTodasLasCarteras(currentUser);
  const misClientes = verTodo ? state.clientes : state.clientes.filter(c => carterasDeUsuario(currentUser).includes(c.encargadoId));

  const misRequerimientos = state.requerimientos.filter(r => currentUser.isAdmin || dirigidoAIds(r).includes(currentUser.id));
  const reqPendientes = misRequerimientos.filter(r => r.estado !== 'Resuelto');
  const hoy = todayISO();
  const reqVencidos = reqPendientes.filter(r => r.fechaRespuesta && r.fechaRespuesta < hoy);

  // Confección Iva (F-29) es una sección exclusiva del Administrador ahora;
  // igual se calcula por si se necesita, pero solo se muestra la tarjeta si
  // currentUser.isAdmin.
  const f29Pendientes = misClientes.filter(c => (c.f29Requerido || c.f29CasoEspecialMes === mesActualISO()) && c.f29Estado !== 'enviado');

  const obScopeIds = new Set(obligacionesScope(verTodo).map(c => c.id));
  const obPendientes = state.obligaciones.filter(o => obScopeIds.has(o.clienteId) && o.estado !== 'Presentado');
  const obVencidas = obPendientes.filter(o => o.fechaLimite && o.fechaLimite < hoy);

  const mesActualTareas = new Date().toISOString().slice(0,7);
  const plantillaTareas = state.tareasPlantilla;
  const tareasIncompletas = misClientes.filter(c => {
    const registro = (c.tareas||{})[mesActualTareas] || {};
    return plantillaTareas.some(t => !registro[t]);
  }).length;

  let facturacionCard = '';
  if(currentUser.isAdmin){
    const mesActual = new Date().toISOString().slice(0,7);
    const facPendientes = state.clientes.filter(c => {
      const f = facturaDisplay(c, mesActual);
      return f.estado === 'Pendiente';
    });
    facturacionCard = `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 cursor-pointer hover:border-blue-400 transition-colors" onclick="setTab('facturacion')">
        <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1">Facturación pendiente · ${mesLabel(mesActual)}</div>
        <div class="text-2xl font-bold text-gray-800">${facPendientes.length}</div>
        <div class="text-xs text-gray-400 mt-1">clientes sin marcar como facturados este mes</div>
      </div>
    `;
  }
  // Contabilidad/TAX no tienen "cartera propia" (ven todo), así que la
  // tarjeta de respaldo cambia de etiqueta para no decir "Tu cartera" cuando
  // en realidad son los clientes de todo el sistema.
  const carteraCard = facturacionCard || `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 cursor-pointer hover:border-blue-400 transition-colors" onclick="setTab('cartera')">
      <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1">${verTodo ? 'Clientes en seguimiento' : 'Tu cartera'}</div>
      <div class="text-2xl font-bold text-gray-800">${misClientes.length}</div>
      <div class="text-xs text-gray-400 mt-1">${verTodo ? 'total en el sistema' : 'clientes asignados'}</div>
    </div>`;

  return `
    <div class="max-w-4xl">
      <h2 class="text-2xl font-bold text-gray-800 mb-1">Hola, ${escapeHtml(currentUser.name.split(' ')[0])}</h2>
      <p class="text-sm text-gray-500 mb-6">Esto es lo que tienes pendiente hoy.</p>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 cursor-pointer hover:border-blue-400 transition-colors" onclick="setTab('requerimientos')">
          <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1">Requerimientos pendientes</div>
          <div class="text-2xl font-bold text-gray-800">${reqPendientes.length}</div>
          <div class="text-xs mt-1 ${reqVencidos.length ? 'text-red-500 font-semibold' : 'text-gray-400'}">${reqVencidos.length ? `${reqVencidos.length} vencido${reqVencidos.length===1?'':'s'}` : 'ninguno vencido'}</div>
        </div>
        ${currentUser.isAdmin ? `
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 cursor-pointer hover:border-blue-400 transition-colors" onclick="irAConfeccionIva()">
          <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1">IVA (F-29) sin enviar</div>
          <div class="text-2xl font-bold text-gray-800">${f29Pendientes.length}</div>
          <div class="text-xs text-gray-400 mt-1">de la nómina vigente en tu cartera</div>
        </div>` : ''}
        ${carteraCard}
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 cursor-pointer hover:border-blue-400 transition-colors" onclick="setTab('obligaciones')">
          <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1">Obligaciones Tributarias</div>
          <div class="text-2xl font-bold text-gray-800">${obPendientes.length}</div>
          <div class="text-xs mt-1 ${obVencidas.length ? 'text-red-500 font-semibold' : 'text-gray-400'}">${obVencidas.length ? `${obVencidas.length} vencida${obVencidas.length===1?'':'s'}` : 'ninguna vencida'}</div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 cursor-pointer hover:border-blue-400 transition-colors" onclick="setTab('tareas')">
          <div class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1">Tareas mensuales incompletas</div>
          <div class="text-2xl font-bold text-gray-800">${tareasIncompletas}</div>
          <div class="text-xs text-gray-400 mt-1">de ${misClientes.length} clientes, este mes</div>
        </div>
      </div>

      ${reqPendientes.length ? `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
        <h3 class="text-sm font-bold text-gray-700 mb-4">Tus requerimientos pendientes (${reqPendientes.length})</h3>
        <div class="space-y-2">
          ${(inicioReqExpandido ? reqPendientes : reqPendientes.slice(0,6)).map(r => `
            <div class="flex items-center justify-between text-sm border-b border-gray-100 pb-2">
              <div>
                <span class="font-medium text-gray-800">${escapeHtml(r.tipo)}</span>
                <span class="text-gray-400 ml-2">creado ${escapeHtml(r.fechaCreacion||'—')}</span>
              </div>
              <div class="flex items-center gap-2">
                ${r.fechaRespuesta && r.fechaRespuesta < hoy ? `<span class="text-red-500 text-xs font-semibold">Vencido ${escapeHtml(r.fechaRespuesta)}</span>` : ''}
                <select onchange="this.className = reqEstadoClass(this.value); updateRequerimientoEstado('${r.id}', this.value)" class="${reqEstadoClass(r.estado)}">
                  ${REQ_ESTADOS.map(e=>`<option value="${e}" ${r.estado===e?'selected':''}>${e}</option>`).join('')}
                </select>
              </div>
            </div>
          `).join('')}
        </div>
        ${reqPendientes.length > 6 ? `<button onclick="toggleInicioReqExpandido()" class="text-blue-600 hover:text-blue-800 text-xs font-semibold mt-4">${inicioReqExpandido ? 'Mostrar menos' : `Desplegar los ${reqPendientes.length} pendientes`}</button>` : ''}
      </div>
      ` : `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 text-center text-gray-400 text-sm">
        No tienes requerimientos pendientes. 🎉
      </div>
      `}
    </div>
  `;
}

async function submitRequerimiento(){

function formatoCLP(n){
  return Math.round(n).toLocaleString('es-CL');
}

const MESES_NOMBRE = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let ufAnualCache = {}; // año -> serie [{fecha, valor}]
let ufAnualLoading = {}; // año -> bool

async function cargarUFAnual(year){
  ufAnualLoading[year] = true;
  try{
    const res = await fetch(`https://mindicador.cl/api/uf/${year}`, { cache: 'no-store' });
    const data = await res.json();
    ufAnualCache[year] = data.serie || [];
  }catch(e){
    ufAnualCache[year] = [];
  }
  ufAnualLoading[year] = false;
  if(activeTab === 'dashboard') renderApp();
}

// Para cada mes del año, se queda con el valor de UF del ÚLTIMO día disponible en ese mes
// (el último día calendario si el mes ya terminó; el último día informado hasta ahora si el mes está en curso).
function ufPorMes(serie){
  const porMes = {};
  serie.forEach(item => {
    const key = item.fecha.slice(0,7); // "YYYY-MM"
    if(!porMes[key] || item.fecha > porMes[key].fecha) porMes[key] = item;
  });
  return porMes;
}

function dashboardFlujoUF(sumaUFMensual){
  const year = new Date().getFullYear();

  if(!ufAnualCache[year] && !ufAnualLoading[year]){
    cargarUFAnual(year); // se dispara en segundo plano; re-renderiza al llegar
  }

  if(!ufAnualCache[year]){
    return `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
        <h3 class="text-sm font-bold text-gray-700 mb-2">Flujo de caja estimado (UF → CLP)</h3>
        <p class="text-sm text-gray-400">Cargando valores históricos de la UF…</p>
      </div>
    `;
  }

  const serie = ufAnualCache[year];
  if(!serie.length){
    return `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
        <h3 class="text-sm font-bold text-gray-700 mb-2">Flujo de caja estimado (UF → CLP)</h3>
        <p class="text-sm text-red-500">No se pudo obtener el historial de la UF (revisa tu conexión). <button onclick="cargarUFAnual(${year})" class="text-blue-600 underline">Reintentar</button></p>
      </div>
    `;
  }

  const porMes = ufPorMes(serie);
  const mesActual = new Date().getMonth(); // 0-indexado
  const masReciente = serie.reduce((max, item) => (!max || item.fecha > max.fecha) ? item : max, null);
  const ultimaUFConocida = masReciente ? masReciente.valor : 0;

  let acumulado = 0;
  const filas = [];
  for(let m = 0; m <= 11; m++){
    const key = `${year}-${String(m+1).padStart(2,'0')}`;
    const dato = porMes[key];
    const esProyectado = m > mesActual || !dato;
    const ufMes = dato ? dato.valor : ultimaUFConocida;

    const hayFacturacionReal = state.clientes.some(c => (c.facturacion||{})[key]);
    const facturadoRealUF = hayFacturacionReal ? state.clientes.reduce((s,c) => {
      const rec = (c.facturacion||{})[key];
      return s + (rec && rec.estado === 'Facturado' ? (rec.montoUF||0) : 0);
    }, 0) : sumaUFMensual;

    const clp = facturadoRealUF * ufMes;
    if(!esProyectado) acumulado += clp;
    filas.push({ mes: MESES_NOMBRE[m], ufMes, clp, esProyectado, esReal: hayFacturacionReal });
  }

  // Proyección: acumulado real (meses ya transcurridos) + meses restantes con la última UF conocida
  const acumuladoReal = acumulado;
  const flujoProyectadoRestante = filas.filter(f=>f.esProyectado).reduce((s,f)=>s+f.clp,0);
  const proyeccionAnual = acumuladoReal + flujoProyectadoRestante;

  const maxClp = Math.max(1, ...filas.map(f=>f.clp));

  return `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
      <div class="flex items-center justify-between mb-1">
        <h3 class="text-sm font-bold text-gray-700">Flujo de caja estimado (UF → CLP), ${year}</h3>
      </div>
      <p class="text-xs text-gray-400 mb-5">Cada mes usa la UF de su último día disponible. Los meses aún no transcurridos (en gris) se proyectan con la última UF conocida ($${formatoCLP(ultimaUFConocida)}).</p>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-blue-50 rounded-xl p-4">
          <div class="text-xs font-semibold uppercase text-blue-700 mb-1">Acumulado real (a la fecha)</div>
          <div class="text-xl font-bold text-blue-900">$${formatoCLP(acumuladoReal)}</div>
        </div>
        <div class="bg-gray-50 rounded-xl p-4">
          <div class="text-xs font-semibold uppercase text-gray-500 mb-1">Proyectado resto del año</div>
          <div class="text-xl font-bold text-gray-700">$${formatoCLP(flujoProyectadoRestante)}</div>
        </div>
        <div class="bg-green-50 rounded-xl p-4">
          <div class="text-xs font-semibold uppercase text-green-700 mb-1">Proyección total ${year}</div>
          <div class="text-xl font-bold text-green-800">$${formatoCLP(proyeccionAnual)}</div>
        </div>
      </div>

      <div class="space-y-2">
        ${filas.map(f => `
          <div class="flex items-center gap-3">
            <div class="w-20 text-xs text-gray-500">${f.mes}</div>
            <div class="flex-1 bg-gray-100 rounded-full h-4 overflow-hidden">
              <div class="${f.esProyectado?'bg-gray-300':'bg-blue-500'} h-4 rounded-full" style="width:${(f.clp/maxClp)*100}%"></div>
            </div>
            <div class="w-40 text-xs text-right ${f.esProyectado?'text-gray-400 italic':'text-gray-700'}">$${formatoCLP(f.clp)}${f.esProyectado?' (proy.)':(f.esReal?' (real)':' (estimado)')}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ---------------- FACTURACIÓN (Tailwind) ---------------- */
const FACTURA_ESTADOS = ['Pendiente', 'Facturado', 'No Aplica'];
const FACTURA_ESTADO_CLASS = {
  'Facturado': 'bg-green-100 text-green-700 border-green-300 focus:ring-green-300',
  'Pendiente': 'bg-yellow-100 text-yellow-800 border-yellow-300 focus:ring-yellow-300',
  'No Aplica': 'bg-gray-100 text-gray-500 border-gray-300 focus:ring-gray-300',
};
function facturaEstadoClass(estado){
  const base = 'rounded-full text-xs font-semibold px-3 py-1.5 border cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-1';
  return `${base} ${FACTURA_ESTADO_CLASS[estado] || FACTURA_ESTADO_CLASS['Pendiente']}`;
}

function mesesDesdeEnero2026(){
  const meses = [];
  const anioInicio = 2026;
  const anioFin = Math.max(new Date().getFullYear(), 2026);
  for(let y = anioInicio; y <= anioFin; y++){
    for(let m = 1; m <= 12; m++) meses.push(`${y}-${String(m).padStart(2,'0')}`);
  }
  return meses;
}

function mesLabel(mes){
  const [y,m] = mes.split('-').map(Number);
  return `${MESES_NOMBRE[m-1]} ${y}`;
}

function facturaDisplay(c, mes){
  const rec = (c.facturacion || {})[mes];
  return rec ? rec : { estado: 'Pendiente', montoUF: (c.valorServicioMensual || 0) };
}

async function setFacturaEstado(clienteId, mes, estado){
  const c = state.clientes.find(c => c.id === clienteId);
  if(!c) return;
  if(!c.facturacion) c.facturacion = {};
  const actual = c.facturacion[mes] || { montoUF: c.valorServicioMensual || 0 };
  c.facturacion[mes] = { montoUF: actual.montoUF, estado };
  await saveState();
  refreshFacturacionSummary(mes);
}

async function setFacturaMonto(clienteId, mes, valor){
  const c = state.clientes.find(c => c.id === clienteId);
  if(!c) return;
  if(!c.facturacion) c.facturacion = {};
  const actual = c.facturacion[mes] || { estado: 'Pendiente' };
  const monto = parseFloat(valor);
  c.facturacion[mes] = { estado: actual.estado, montoUF: isNaN(monto) ? 0 : monto };
  await saveState();
  refreshFacturacionSummary(mes);
}

// Re-render parcial de Facturación: recalcula los totales (operación barata,
// son sumas sobre arreglos) y solo actualiza las tarjetas de resumen y las
// barras por encargado — sin reconstruir la tabla completa de clientes.
function refreshFacturacionSummary(mes){
  if(activeTab !== 'facturacion') return;
  const isAdmin = currentUser.isAdmin;
  const base = isAdmin ? clientesEnSucursalActiva() : state.clientes.filter(c => carterasDeUsuario(currentUser).includes(c.encargadoId));
  const resumenGlobal = resumenFacturacion(base, mes);

  const elEsperado = document.getElementById('facEsperado');
  const elFacturado = document.getElementById('facFacturado');
  const elPct = document.getElementById('facPct');
  if(elEsperado) elEsperado.textContent = `${resumenGlobal.esperado.toFixed(1)} UF`;
  if(elFacturado) elFacturado.textContent = `${resumenGlobal.facturado.toFixed(1)} UF`;
  if(elPct) elPct.textContent = `${resumenGlobal.pct}%`;

  if(!isAdmin) return;
  state.usuarios.forEach(u => {
    const clientesEnc = base.filter(c => c.encargadoId === u.id);
    if(!clientesEnc.length) return;
    const r = resumenFacturacion(clientesEnc, mes);
    const rSucursal = resumenFacturacion(clientesDeSucursal(u.sucursal === 'Ambas' ? 'Concepcion' : u.sucursal), mes);
    const numsEl = document.getElementById(`facEncNums_${u.id}`);
    const barEl = document.getElementById(`facEncBar_${u.id}`);
    if(numsEl) numsEl.innerHTML = `${r.facturado.toFixed(1)} / ${r.esperado.toFixed(1)} UF · <b>${r.pct}%</b> <span class="text-gray-400">(sucursal: ${rSucursal.pct}%)</span>`;
    if(barEl){
      barEl.style.width = Math.min(r.pct, 100) + '%';
      barEl.className = (r.pct >= rSucursal.pct ? 'bg-green-500' : 'bg-amber-500') + ' h-2 rounded-full';
    }
  });
}

function clientesDeSucursal(sucursal){
  return state.clientes.filter(c => c.sucursal === sucursal);
}

function resumenFacturacion(listaClientes, mes){
  let esperado = 0, facturado = 0;
  listaClientes.forEach(c => {
    const f = facturaDisplay(c, mes);
    if(f.estado === 'No Aplica') return;
    esperado += (f.montoUF || 0);
    if(f.estado === 'Facturado') facturado += (f.montoUF || 0);
  });
  const pct = esperado > 0 ? Math.round((facturado/esperado)*100) : 0;
  return { esperado, facturado, pct };
}

function facturaBulkBar(mes){
  return `
    <div id="facBulkBar" style="display:${facturaSelected.size?'flex':'none'};align-items:center;gap:10px;background:#F3F4F6;border:1px solid #E5E7EB;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13px;" class="text-gray-700">
      <span><span id="facSelCount">${facturaSelected.size}</span> seleccionado${facturaSelected.size===1?'':'s'}</span>
      <select id="facBulkEstado" class="rounded-lg border border-gray-300 px-2 py-1 text-sm">
        ${FACTURA_ESTADOS.map(e=>`<option value="${e}">${e}</option>`).join('')}
      </select>
      <button onclick="aplicarAccionMasivaFacturacion('${mes}')" class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-semibold px-3 py-1.5 rounded-lg">Aplicar a selección</button>
      <button onclick="facturaSelected.clear(); renderApp();" class="text-xs text-gray-500 hover:text-gray-700 underline">Cancelar selección</button>
    </div>
  `;
}

function onFacturaCheckChange(id, checked){
  if(checked) facturaSelected.add(id); else facturaSelected.delete(id);
  const bar = document.getElementById('facBulkBar');
  if(bar) bar.style.display = facturaSelected.size ? 'flex' : 'none';
  const cnt = document.getElementById('facSelCount');
  if(cnt) cnt.textContent = facturaSelected.size;
}

function toggleSelectAllFactura(checked){
  document.querySelectorAll('.fac-check').forEach(cb => {
    cb.checked = checked;
    if(checked) facturaSelected.add(cb.dataset.id); else facturaSelected.delete(cb.dataset.id);
  });
  const bar = document.getElementById('facBulkBar');
  if(bar) bar.style.display = facturaSelected.size ? 'flex' : 'none';
  const cnt = document.getElementById('facSelCount');
  if(cnt) cnt.textContent = facturaSelected.size;
}

async function aplicarAccionMasivaFacturacion(mes){
  if(!facturaSelected.size) return;
  const estadoSel = document.getElementById('facBulkEstado');
  const estado = estadoSel ? estadoSel.value : 'Facturado';
  facturaSelected.forEach(id => {
    const c = state.clientes.find(c => c.id === id);
    if(!c) return;
    if(!c.facturacion) c.facturacion = {};
    const actual = c.facturacion[mes] || { montoUF: c.valorServicioMensual || 0 };
    c.facturacion[mes] = { montoUF: actual.montoUF, estado };
  });
  await saveState();
  facturaSelected.clear();
  renderApp();
  showToast('Estado actualizado en lote.');
}

// Declaraciones juradas de renta más comunes por año tributario. Roster fijo:
// todas las empresas con régimen tributario definido y distinto de "Persona Natural".
function empresasParaDeclaracionesJuradas(verTodo){
  const base = verTodo ? clientesEnSucursalActiva() : state.clientes.filter(c => carterasDeUsuario(currentUser).includes(c.encargadoId));
  return base.filter(c => c.regimenTributario && c.regimenTributario !== 'Persona Natural');
}

  for(let y = 2026; y <= actual + 1; y++) anios.push(String(y));

}

async function toggleDeclaracionJurada(clienteId, anio, idx, checked){
  const c = state.clientes.find(c => c.id === clienteId);
  if(!c) return;
  const dj = state.declaracionesJuradasPlantilla[idx];
  if(!dj) return;
  if(!c.declaracionesJuradas) c.declaracionesJuradas = {};
  if(!c.declaracionesJuradas[anio]) c.declaracionesJuradas[anio] = {};
  c.declaracionesJuradas[anio][dj] = checked;
  await saveState();
  // Re-render parcial: solo se actualiza el % de esta fila, no toda la tabla.
  const plantilla = state.declaracionesJuradasPlantilla;
  const registro = c.declaracionesJuradas[anio];
  const hechas = plantilla.filter(t => registro[t]).length;
  const pct = plantilla.length ? Math.round((hechas/plantilla.length)*100) : 0;
  const pctCell = document.getElementById(`djPct_${clienteId}_${anio}`);
  if(pctCell){
    pctCell.textContent = pct + '%';
    pctCell.className = `text-center px-3 py-3 font-semibold ${pct===100?'text-green-600':'text-gray-500'}`;
  }
}

async function agregarDeclaracionJuradaPlantilla(){
  const input = document.getElementById('nuevaDJInput');
  const val = input.value.trim();
  if(!val) return;
  if(state.declaracionesJuradasPlantilla.includes(val)) return showToast('Esa declaración ya existe en la lista.');
  state.declaracionesJuradasPlantilla.push(val);
  await saveState();
  renderApp();
}

async function quitarDeclaracionJuradaPlantilla(index){
  state.declaracionesJuradasPlantilla.splice(index, 1);
  await saveState();
  renderApp();
}

async function submitObligacion(){
  const clienteSel = document.getElementById('obCliente');
  const clienteId = clienteSel.value;
  const tipo = document.getElementById('obTipo').value;
  const periodo = document.getElementById('obPeriodo').value.trim();
  const fechaLimite = document.getElementById('obFechaLimite').value;
  if(!clienteId) return showToast('Selecciona un cliente.');
  state.obligaciones.push({ id: uid('ob'), clienteId, tipo, periodo, fechaLimite, estado: 'Pendiente' });
  await saveState();
  showToast('Obligación agregada.');
  renderApp();
}

async function setObligacionEstado(id, estado){
  const o = state.obligaciones.find(o => o.id === id);
  if(!o) return;
  o.estado = estado;
  await saveState();
}

async function removeObligacion(id){
  if(!confirm('¿Eliminar esta obligación tributaria? Esta acción no se puede deshacer.')) return;
  state.obligaciones = state.obligaciones.filter(o => o.id !== id);
  await saveState();
  renderApp();
  showToast('Obligación eliminada.');
}

async function toggleTarea(clienteId, mes, idx, checked){
  const c = state.clientes.find(c => c.id === clienteId);
  if(!c) return;
  const tarea = state.tareasPlantilla[idx];
  if(!tarea) return;
  if(!c.tareas) c.tareas = {};
  if(!c.tareas[mes]) c.tareas[mes] = {};
  c.tareas[mes][tarea] = checked;
  await saveState();
  // Re-render parcial: solo se actualiza el % de esta fila, no toda la tabla.
  const plantilla = state.tareasPlantilla;
  const registro = c.tareas[mes];
  const hechas = plantilla.filter(t => registro[t]).length;
  const pct = plantilla.length ? Math.round((hechas/plantilla.length)*100) : 0;
  const pctCell = document.getElementById(`tareaPct_${clienteId}_${mes}`);
  if(pctCell){
    pctCell.textContent = pct + '%';
    pctCell.className = `text-center px-3 py-3 font-semibold ${pct===100?'text-green-600':'text-gray-500'}`;
  }
}

async function agregarTareaPlantilla(){
  const input = document.getElementById('nuevaTareaInput');
  const val = input.value.trim();
  if(!val) return;
  if(state.tareasPlantilla.includes(val)) return showToast('Esa tarea ya existe.');
  state.tareasPlantilla.push(val);
  await saveState();
  renderApp();
}

async function quitarTareaPlantilla(index){
  state.tareasPlantilla.splice(index, 1);
  await saveState();
  renderApp();
}

function descargarCSV(filename, rows){
  const csv = rows.map(r => r.map(v => {
    const s = (v===null||v===undefined) ? '' : String(v);
    if(s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  });
  descargarCSV(`cartera_clientes_${todayISO()}.csv`, rows);

function generatePassword(){
  const words = ['Rio','Sol','Luna','Vela','Roca','Nube','Faro','Trigo','Cobre','Nieve','Junco','Cerro','Puma','Ancla'];
  const w = words[Math.floor(Math.random()*words.length)];
  const n = Math.floor(Math.random()*90)+10;
  const symbols = '!#$%';
  const s = symbols[Math.floor(Math.random()*symbols.length)];
  return `${w}${n}${s}`;
}

async function changePassword(id, label){
  const nueva = prompt(`Nueva clave para ${label}:`, generatePassword());
  if(!nueva) return;
  const hash = await sha256(nueva.trim());
  creds.usuarios[id] = hash;
  await saveCreds();
  alert(`Clave actualizada para ${label}:\n\n${nueva}\n\nCompártela por un canal seguro. No se mostrará de nuevo.`);
}

async function addClient(){

  const name = document.getElementById('newClientName').value.trim();
  const rut = document.getElementById('newClientRut').value.trim();
  const clave = document.getElementById('newClientClave').value.trim();
  const encargadoId = document.getElementById('newClientEncargado').value;
  if(!name) return showToast('Escribe un nombre de cliente.');
  state.clientes.push({ id: uid('c'), name, rut, clave, encargadoId: encargadoId || null, notas: '' });
  await saveState();
  renderApp();
  showToast('Cliente agregado.');
}

async function removeClient(id){
  if(!currentUser.isAdmin) return showToast('Solo un administrador puede eliminar clientes.');
  const c = state.clientes.find(c => c.id === id);
  if(!confirm(`¿Eliminar al cliente "${c ? c.name : ''}"? Esta acción no se puede deshacer.`)) return;
  state.clientes = state.clientes.filter(c => c.id !== id);

}

async function reassignClient(clientId, encargadoId){

  c.encargadoId = encargadoId || null;

  renderApp();
  showToast('Cliente reasignado.');
}

function generarUsuarioLogin(nombre){
  const primerNombre = nombre.trim().split(' ')[0]
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase();
  let candidato = primerNombre;
  let n = 1;
  const existentes = new Set(state.usuarios.map(u => (u.usuario||'').toLowerCase()));
  while(existentes.has(candidato)){
    n++;
    candidato = primerNombre + n;
  }
  return candidato;
}

async function addUsuario(){
  const nameInput = document.getElementById('newUserName');
  const rolSelect = document.getElementById('newUserRol');
  const sucursalSelect = document.getElementById('newUserSucursal');
  const name = nameInput.value.trim();
  const rol = rolSelect.value;
  // Administrador y Contabilidad ven ambas sucursales; el resto queda en la
  // sucursal que se elija en el formulario.
  const sucursal = (esRolAdmin(rol) || esRolContabilidad(rol)) ? 'Ambas' : sucursalSelect.value;
  if(!name) return showToast('Escribe el nombre del usuario.');
  const id = uid('u');
  const pass = generatePassword();
  const hash = await sha256(pass);
  const usuarioLogin = generarUsuarioLogin(name);
  const nuevoUsuario = { id, name, rol, usuario: usuarioLogin, sucursal };
  // Un Asistente nuevo arranca sin cartera asignada; el administrador le
  // otorga acceso manualmente desde "Accesos a cartera" más abajo.
  if(esRolAsistente(rol)){
    nuevoUsuario.carterasVisibles = [];
  }
  state.usuarios.push(nuevoUsuario);
  creds.usuarios[id] = hash;
  await saveState();
  await saveCreds();
  nameInput.value = '';
  renderApp();
  alert(`Acceso creado para ${name} (${rol} · ${sucursal}):\n\nUsuario: ${usuarioLogin}\nClave: ${pass}\n\nCompártelos por un canal seguro. No se mostrarán de nuevo.`);
}

async function agregarCarteraVisible(usuarioId){
  const sel = document.getElementById('addCartera_' + usuarioId);
  if(!sel || !sel.value) return;
  const u = state.usuarios.find(u => u.id === usuarioId);
  if(!u) return;
  if(!u.carterasVisibles) u.carterasVisibles = [];
  if(!u.carterasVisibles.includes(sel.value)) u.carterasVisibles.push(sel.value);
  await saveState();
  renderApp();
  showToast('Acceso otorgado.');
}

async function quitarCarteraVisible(usuarioId, carteraId){
  const u = state.usuarios.find(u => u.id === usuarioId);
  if(!u) return;
  u.carterasVisibles = (u.carterasVisibles||[]).filter(id => id !== carteraId);
  await saveState();
  renderApp();
  showToast('Acceso quitado.');
}

async function removeUsuario(id){
  const u = state.usuarios.find(u => u.id === id);
  if(!u) return;
  if(esRolAdmin(u.rol)){
    const quedanAdmins = state.usuarios.filter(x => x.id !== id && esRolAdmin(x.rol)).length;
    if(quedanAdmins === 0){
      alert('No puedes eliminar a este usuario: quedaría el sistema sin ningún Administrador.');
      return;
    }
  }
  if(!confirm(`¿Eliminar a "${u.name}" (${u.rol})? Perderá su acceso y sus clientes quedarán sin asignar. Esta acción no se puede deshacer.`)) return;
  state.usuarios = state.usuarios.filter(u => u.id !== id);
  state.clientes.forEach(c => { if(c.encargadoId === id) c.encargadoId = null; });
  delete creds.usuarios[id];
  if(activeFolder === id) activeFolder = 'todos';
  await saveState();
  await saveCreds();
  renderApp();
  showToast('Usuario y su acceso fueron eliminados. Sus clientes quedaron sin asignar.');
}

        : filtered.length===0 ? `<div class="empty-state">

function clientTableReadonly(list){

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}
